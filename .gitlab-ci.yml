# CI for the two clients. Each job is scoped to its own subdir.
python-ci:
  image: python:3.12
  rules:
    - changes: [python/**/*]
    - if: '$CI_PIPELINE_SOURCE == "web"'
  script:
    - pip install poetry
    - cd python
    - poetry install
    - poetry run ruff check .
    - poetry run pytest -q

go-ci:
  image: golang:1.21
  rules:
    - changes: [go/**/*]
    - if: '$CI_PIPELINE_SOURCE == "web"'
  script:
    - cd go
    - test -z "$(gofmt -l .)" || { echo "gofmt: files need formatting"; gofmt -l .; exit 1; }
    - go vet ./...
    - go test ./...
