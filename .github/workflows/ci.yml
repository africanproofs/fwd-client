name: ci

# CI for the polyglot fwd-client. The repo lives on GitHub, so this is GitHub
# Actions — the root .gitlab-ci.yml is inert on a github remote. One job per
# language, mirroring that spec.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry==1.8.5
      - name: Install
        run: poetry install
      - name: Ruff
        run: poetry run ruff check .
      - name: Pytest
        run: poetry run pytest -q

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
